<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="100" width="400" height="300" rx="12" fill="#2C1810" stroke="#ddd"/>
<text x="32" y="120" font-size="12" font-weight="700" fill="#888">BEFORE (broken)</text>
<rect x="460" y="100" width="400" height="300" rx="12" fill="#0D2818" stroke="#ddd"/>
<text x="472" y="120" font-size="12" font-weight="700" fill="#888">AFTER (correct)</text>
<rect x="40" y="140" width="160" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="120.0" y="168.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Host Node</text>
<text x="120.0" y="185.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">64 GB RAM</text>
<rect x="240" y="140" width="160" height="60" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="320.0" y="168.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">/proc/meminfo</text>
<text x="320.0" y="185.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Reports 64 GB</text>
<rect x="40" y="230" width="160" height="60" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="120.0" y="258.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">JVM reads host</text>
<text x="120.0" y="275.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Claims 16 GB heap</text>
<rect x="240" y="230" width="160" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="320.0" y="258.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Container</text>
<text x="320.0" y="275.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Limit: 512 MB</text>
<rect x="140" y="320" width="160" height="60" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="220.0" y="348.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">OOMKill!</text>
<text x="220.0" y="365.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Exit code 137</text>
<rect x="480" y="140" width="160" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="560.0" y="168.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Host Node</text>
<text x="560.0" y="185.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">64 GB RAM</text>
<rect x="680" y="140" width="160" height="60" rx="9" fill="#0D2818" stroke="#27AE60" stroke-width="1.5"/>
<text x="760.0" y="168.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">cgroup limits</text>
<text x="760.0" y="185.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">memory.max=512m</text>
<rect x="480" y="230" width="180" height="60" rx="9" fill="#0D2818" stroke="#27AE60" stroke-width="1.5"/>
<text x="570.0" y="258.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">UseContainerSupport</text>
<text x="570.0" y="275.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Reads cgroup, not host</text>
<rect x="700" y="230" width="140" height="60" rx="9" fill="#0D2818" stroke="#27AE60" stroke-width="1.5"/>
<text x="770.0" y="258.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">MaxRAMPct=75</text>
<text x="770.0" y="275.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Heap = 384 MB</text>
<rect x="560" y="320" width="180" height="60" rx="9" fill="#00BCD4" stroke="#00BCD4" stroke-width="2"/>
<text x="650.0" y="348.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Healthy Pod</text>
<text x="650.0" y="365.0" font-size="11.5" fill="#dddddd" text-anchor="middle">Respects limits</text>
<path d="M200,170 L240,170" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M320,200 L120,230" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M120,290 L180,320" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="156.0" y="299.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">boom</text>
<text x="156.0" y="299.0" font-size="11" fill="#b8650a" text-anchor="middle">boom</text>
<path d="M320,260 L280,320" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M640,170 L680,170" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M560,290 L620,320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M770,290 L710,320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="440" y="30" font-size="20" fill="#00BCD4" text-anchor="middle" font-weight="700">Container-Aware JVM: Before &amp; After</text>
<text x="440" y="55" font-size="13" fill="#90A4AE" text-anchor="middle">UseContainerSupport reads cgroup limits instead of /proc/meminfo</text>
</svg>