## ============================================================
## Demo 04: Spring Boot + Project Leyden AOT Cache
## Spring Boot 4.0.5 / JDK 25 LTS
## ============================================================

spring.application.name=leyden-demo
server.port=8080

## ── Actuator ─────────────────────────────────────────────────
## Expose health and info endpoints (used during training run)
management.endpoints.web.exposure.include=health,info,caches
management.endpoint.health.show-details=always

## ── Cache ────────────────────────────────────────────────────
## Simple cache (no external dependency) — loads Spring Cache
## infrastructure classes at startup, improving Leyden impact
spring.cache.type=simple

## ── Logging ──────────────────────────────────────────────────
## Keep quiet during training run, show startup banner for timing
logging.level.root=WARN
logging.level.org.springframework.boot=INFO
