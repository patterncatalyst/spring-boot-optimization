<rect x="300" y="215" width="250" height="60" rx="9" fill="#281E0D" stroke="#F5A623" stroke-width="2"/>
<text x="425.0" y="243.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">MaxMetaspaceSize=256m</text>
