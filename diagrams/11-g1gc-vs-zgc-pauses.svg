<text x="440" y="25" font-size="20" fill="#00BCD4" text-anchor="middle" font-weight="700">G1GC vs ZGC — Pause Behavior</text>
<text x="440" y="50" font-size="13" fill="#90A4AE" text-anchor="middle">G1GC: max throughput, pauses scale with heap · ZGC: predictable latency, 5-15% throughput cost</text>
