<text x="140.0" y="245.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">MaxRAMPercentage</text>
<rect x="60" y="305" width="160" height="50" rx="9" fill="#281E0D" stroke="#F5A623" stroke-width="2"/>
<text x="140.0" y="328.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Metaspace</text>
<text x="140.0" y="345.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">80-250 MB</text>
<rect x="60" y="365" width="160" height="50" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="140.0" y="388.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Thread Stacks</text>
