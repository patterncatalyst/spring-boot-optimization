<text x="320.0" y="238.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Streaming</text>
<text x="320.0" y="255.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">SSE / WebSocket only</text>
<rect x="140" y="300" width="170" height="60" rx="9" fill="#281E0D" stroke="#F5A623" stroke-width="2"/>
<text x="225.0" y="328.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Best for</text>
<text x="225.0" y="345.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Public APIs, browsers</text>
<rect x="470" y="130" width="170" height="60" rx="9" fill="#0D1B2A" stroke="#1E6FC8" stroke-width="2"/>
<text x="555.0" y="158.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">HTTP/2</text>
<text x="555.0" y="175.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Binary, multiplexed</text>
<rect x="660" y="130" width="180" height="60" rx="9" fill="#0D1B2A" stroke="#1E6FC8" stroke-width="2"/>
<text x="750.0" y="158.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Protobuf payload</text>
<text x="750.0" y="175.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">~40 bytes per message</text>
<rect x="470" y="210" width="170" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="555.0" y="238.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Persistent conn</text>
<text x="555.0" y="255.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Multiplexed streams</text>
<rect x="660" y="210" width="180" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="750.0" y="238.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">4 streaming modes</text>
<text x="750.0" y="255.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Built-in, first-class</text>
<rect x="570" y="300" width="180" height="60" rx="9" fill="#00BCD4" stroke="#00BCD4" stroke-width="2"/>
<text x="660.0" y="328.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Best for</text>
<text x="660.0" y="345.0" font-size="11.5" fill="#dddddd" text-anchor="middle">Pod-to-pod, internal</text>
<path d="M210,160 L230,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M640,160 L660,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="440" y="25" font-size="20" fill="#00BCD4" text-anchor="middle" font-weight="700">gRPC vs REST Wire Format</text>
<text x="440" y="50" font-size="13" fill="#90A4AE" text-anchor="middle">10x smaller payloads · persistent connections · built-in streaming</text>
