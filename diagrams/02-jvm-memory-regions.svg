<rect x="300" y="295" width="250" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
<text x="425.0" y="323.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Virtual Threads</text>
<text x="425.0" y="340.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Stacks move to heap</text>
<rect x="300" y="375" width="250" height="60" rx="9" fill="#0D1B2A" stroke="#1E3A5F" stroke-width="1.5"/>
<text x="425.0" y="403.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Direct ByteBuffers</text>
<text x="425.0" y="420.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Netty / NIO config</text>
<rect x="610" y="135" width="230" height="100" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="725.0" y="168.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">WARNING</text>
<text x="725.0" y="185.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">MaxRAMPercentage=90</text>
<text x="725.0" y="200.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">starves off-heap regions</text>
<text x="725.0" y="215.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">OOMKill during class load</text>
<rect x="610" y="260" width="230" height="80" rx="9" fill="#00BCD4" stroke="#00BCD4" stroke-width="2"/>
<text x="725.0" y="290.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">MEASURE WITH</text>
<text x="725.0" y="307.5" font-size="11.5" fill="#dddddd" text-anchor="middle">jcmd pid</text>
<text x="725.0" y="322.5" font-size="11.5" fill="#dddddd" text-anchor="middle">VM.native_memory summary</text>
