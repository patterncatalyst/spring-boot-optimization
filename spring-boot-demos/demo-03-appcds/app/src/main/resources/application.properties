spring.application.name=startup-demo

# Spring Boot 4.0: use 'access' model instead of deprecated 'enabled'
management.endpoints.web.exposure.include=health,info
management.endpoint.health.access=unrestricted

# Disable unused auto-configs to keep startup baseline lean
spring.jmx.enabled=false

# Java 21 Virtual Threads (JEP 444) — Spring Boot 4.0 / Java 21
spring.threads.virtual.enabled=true

server.port=8080
