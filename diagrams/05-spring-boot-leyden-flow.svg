<text x="296.0" y="164.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">jar</text>
<text x="296.0" y="164.0" font-size="11" fill="#b8650a" text-anchor="middle">jar</text>
<path d="M440,210 L440,270" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="446.0" y="234.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">aotconf</text>
<text x="446.0" y="234.0" font-size="11" fill="#555" text-anchor="middle">aotconf</text>
<path d="M560,315 L620,290" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="596.0" y="296.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">cache</text>
<text x="596.0" y="296.5" font-size="11" fill="#b8650a" text-anchor="middle">cache</text>
<path d="M140,305 L320,170" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="440" y="30" font-size="20" fill="#00BCD4" text-anchor="middle" font-weight="700">Spring Boot + Project Leyden — 3-Stage Build</text>
<text x="440" y="55" font-size="13" fill="#90A4AE" text-anchor="middle">Explicit -XX:AOTMode steps: record profile, create cache, run with cache</text>
