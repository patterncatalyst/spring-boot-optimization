spring.application.name=latency-demo

# Expose all Actuator endpoints
management.endpoints.web.exposure.include=*

# Spring Boot 4.0: use 'access' model instead of deprecated 'enabled'
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.access=unrestricted

# Prometheus metrics export
management.prometheus.metrics.export.enabled=true

# GC pause histogram — enables P50/P95/P99 quantile queries in Prometheus
management.metrics.distribution.percentiles-histogram.jvm.gc.pause=true
management.metrics.distribution.percentiles.jvm.gc.pause=0.5,0.95,0.99

# Disable unused auto-configs
spring.jmx.enabled=false

server.port=8080
