<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="100" width="410" height="300" rx="12" fill="#2C1810" stroke="#ddd"/>
<text x="32" y="120" font-size="12" font-weight="700" fill="#888">REST / JSON</text>
<rect x="450" y="100" width="410" height="300" rx="12" fill="#0D1B2A" stroke="#ddd"/>
<text x="462" y="120" font-size="12" font-weight="700" fill="#888">gRPC / Protobuf</text>
<rect x="40" y="130" width="170" height="60" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="125.0" y="158.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">HTTP/1.1</text>
<text x="125.0" y="175.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">Text-based</text>
<rect x="230" y="130" width="180" height="60" rx="9" fill="#2C1810" stroke="#E84855" stroke-width="1.5"/>
<text x="320.0" y="158.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">JSON payload</text>
<text x="320.0" y="175.0" font-size="11.5" fill="#90A4AE" text-anchor="middle">~400 bytes per message</text>
<rect x="40" y="210" width="170" height="60" rx="9" fill="#122040" stroke="#1E3A5F" stroke-width="2"/>
