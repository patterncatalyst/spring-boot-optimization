groups:
  - name: jvm_gc_alerts
    interval: 10s
    rules:

      # ── Recording Rules (pre-computed for dashboards) ──────────

      # Heap utilization ratio (used / max)
      - record: jvm_heap_utilization_ratio
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}

      # GC pause P99 over 1 minute rolling window
      - record: jvm_gc_pause_p99_1m
        expr: |
          histogram_quantile(0.99,
            rate(jvm_gc_pause_seconds_bucket[1m])
          )

      # GC pause P50 over 1 minute rolling window
      - record: jvm_gc_pause_p50_1m
        expr: |
          histogram_quantile(0.50,
            rate(jvm_gc_pause_seconds_bucket[1m])
          )

      # ── Alerting Rules ──────────────────────────────────────────

      # Alert when GC P99 pause > 500ms (sustained 30s)
      - alert: HighGCPauseP99
        expr: jvm_gc_pause_p99_1m > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High GC pause P99 on {{ $labels.instance }}"
          description: |
            GC P99 pause is {{ $value | humanizeDuration }}
            (threshold: 500ms). GC type: {{ $labels.gc_type }}.
            Consider switching to ZGC or Shenandoah.

      # Alert when heap utilization > 85%
      - alert: HighHeapUtilization
        expr: jvm_heap_utilization_ratio > 0.85
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High heap utilization on {{ $labels.instance }}"
          description: |
            Heap is at {{ $value | humanizePercentage }} capacity.
            Risk of OOMKill. Check MaxRAMPercentage setting.

      # Alert when heap utilization > 95% (critical — OOMKill imminent)
      - alert: CriticalHeapUtilization
        expr: jvm_heap_utilization_ratio > 0.95
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: OOMKill imminent on {{ $labels.instance }}"
          description: |
            Heap at {{ $value | humanizePercentage }}.
            OOMKill likely within seconds.
            Increase container memory limit immediately.

      # Alert if too many threads (possible thread leak)
      - alert: HighThreadCount
        expr: jvm_threads_live_threads > 200
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High thread count on {{ $labels.instance }}"
          description: "{{ $value }} live threads detected. Possible thread leak."
