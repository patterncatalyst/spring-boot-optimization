spring.application.name=gc-monitoring-demo

# ── Actuator / Prometheus (Spring Boot 4.0 property names) ─────────
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.access=unrestricted

# Spring Boot 4.0: management.<product>.metrics.export (NOT management.metrics.export.*)
management.prometheus.metrics.export.enabled=true

# Tag every metric with app name for Prometheus label filtering
management.metrics.tags.application=${spring.application.name}

# ── JVM metrics (GC pauses, heap, threads, classes loaded) ─────────
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# GC pause histogram — enables P50/P99 quantile queries in Prometheus
management.metrics.distribution.percentiles-histogram.jvm.gc.pause=true
management.metrics.distribution.percentiles.jvm.gc.pause=0.5,0.95,0.99
management.metrics.distribution.slo.jvm.gc.pause=50ms,100ms,200ms,500ms,1000ms

# Demo request timer histogram
management.metrics.distribution.percentiles-histogram.demo.request.duration=true
management.metrics.distribution.percentiles.demo.request.duration=0.5,0.95,0.99

# ── OpenTelemetry (Spring Boot 4.0 spring-boot-starter-opentelemetry) ─
# Export traces to Jaeger via OTLP HTTP (running in docker-compose on port 4318)
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

# Disable OTLP *metrics* export — we use Prometheus for metrics, OTel for traces only
management.otlp.metrics.export.enabled=false

# ── Java 21 Virtual Threads (JEP 444) ──────────────────────────────
spring.threads.virtual.enabled=true

server.port=8080
