<text x="140.0" y="445.5" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">Native + GC</text>
<text x="140.0" y="462.5" font-size="11.5" fill="#90A4AE" text-anchor="middle">150-400 MB</text>
<rect x="300" y="135" width="250" height="60" rx="9" fill="#0D2818" stroke="#27AE60" stroke-width="1.5"/>
<text x="425.0" y="163.0" font-size="13.5" font-weight="700" fill="#ECF0F1" text-anchor="middle">MaxRAMPercentage=75</text>
