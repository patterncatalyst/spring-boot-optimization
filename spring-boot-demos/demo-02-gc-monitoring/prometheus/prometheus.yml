global:
  scrape_interval:     5s   # Scrape every 5s for snappy demo visibility
  evaluation_interval: 5s
  external_labels:
    monitor: 'jvm-gc-demo'

# ── Alerting Rules ─────────────────────────────────────────
rule_files:
  - "rules.yml"

# ── Scrape Targets ─────────────────────────────────────────
scrape_configs:

  # Java app with G1GC
  - job_name: 'java-g1gc'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['java-app-g1gc:8080']
        labels:
          gc_type: 'G1GC'
          app: 'gc-demo'

  # Java app with ZGC (running on port 8081)
  - job_name: 'java-zgc'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['java-app-zgc:8080']
        labels:
          gc_type: 'ZGC'
          app: 'gc-demo'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
