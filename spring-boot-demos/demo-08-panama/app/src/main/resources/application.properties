## ============================================================
## Demo 08: Spring Boot + Project Panama FFM
## Spring Boot 4.0.5 / JDK 25 LTS
## ============================================================

spring.application.name=panama-demo
server.port=8080

## ── Actuator ─────────────────────────────────────────────────
## Expose health endpoint (used for startup readiness probe)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

## ── Logging ──────────────────────────────────────────────────
## Keep quiet during startup, show Spring Boot banner for timing
logging.level.root=WARN
logging.level.org.springframework.boot=INFO

## ── Panama FFM ───────────────────────────────────────────────
## FFM does not require --enable-preview on JDK 25 (finalized in JDK 22)
## The native library path is set in the Dockerfile via ldconfig
