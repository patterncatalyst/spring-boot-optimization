spring.application.name=grpc-demo

## ── Server ports ──────────────────────────────────────────────────
## REST (Tomcat) on 8080, gRPC (Netty) on 9000
server.port=8080
spring.grpc.server.port=9000

## ── gRPC reflection ───────────────────────────────────────────────
## Lets grpcurl discover services without needing the --proto flag
spring.grpc.server.reflection.enabled=true

## ── Actuator ──────────────────────────────────────────────────────
## Expose health endpoint for container readiness checks
management.endpoints.web.exposure.include=health
