<text x="266.0" y="174.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">75%</text>
<text x="266.0" y="174.0" font-size="11" fill="#555" text-anchor="middle">75%</text>
<path d="M220,330 L300,245" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M220,390 L300,325" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="440" y="30" font-size="20" fill="#00BCD4" text-anchor="middle" font-weight="700">JVM Memory Regions in a Container</text>
<text x="440" y="55" font-size="13" fill="#90A4AE" text-anchor="middle">MaxRAMPercentage=75 only controls Heap — leaving 25% for 5 other regions</text>
