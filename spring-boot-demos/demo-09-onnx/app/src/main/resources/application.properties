spring.application.name=onnx-demo

# Spring Boot 4.0: use 'access' model instead of deprecated 'enabled'
management.endpoints.web.exposure.include=health,info
management.endpoint.health.access=unrestricted

# Java 25 Virtual Threads (JEP 444) — Spring Boot 4.0 / Java 25
spring.threads.virtual.enabled=true

server.port=8080

# ONNX Runtime uses Panama FFM — finalized in JDK 22, no preview flag needed on JDK 25
# Model loads on first request (~200ms); subsequent calls are fast (~5-20ms)
